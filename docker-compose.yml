services:
  # ─────────────── MySQL ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0          # multi-arch: works on both x86-64 and Raspberry Pi (arm64)
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-semesterapp}
      MYSQL_USER:          ${MYSQL_USER:-semesterapp}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-semesterpassword}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"   # expose for optional local management tools
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────── Backend (Express) ───────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT:        3001
      DB_HOST:     mysql
      DB_PORT:     3306
      DB_USER:     ${MYSQL_USER:-semesterapp}
      DB_PASSWORD: ${MYSQL_PASSWORD:-semesterpassword}
      DB_NAME:     ${MYSQL_DATABASE:-semesterapp}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "3001:3001"   # expose so the browser can also reach the API directly if needed

  # ─────────────── Frontend (Nuxt 3) ───────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Server-side proxy target – uses Docker internal hostname
      BACKEND_URL: http://backend:3001
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  mysql_data:
